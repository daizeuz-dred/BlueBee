<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - BlueBee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@500;700&display=swap');
        
        body {
            margin: 0;
            font-family: "Nunito", sans-serif;
            background-color: #f2f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .contact-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }

        h1 { color: #563ce7; font-family: 'Fredoka', sans-serif; font-size: 2.5rem; }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .social-item {
            text-decoration: none;
            color: #2c3e50;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .social-item:hover { transform: translateY(-10px); }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #f8f9fa;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* 2. COLORS: These match the real brand colors */
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook-f { color: #1877F2; }

        .back-link {
            text-decoration: none;
            color: #563ce7;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact Us</h1>
        <p>Choose your preferred platform to reach us!</p>

        <div class="social-grid">
            <a href="https://wa.me/09948471934" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                <div>WhatsApp</div>
            </a>

            <a href="https://www.instagram.com/xiii_heart?igsh=ZzQ3cXI5MnNkMmFt" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <div>Instagram</div>
            </a>

            <a href="https://www.facebook.com/bluebee28" target="_blank" class="social-item">
                <div class="icon-box"><i class="fab fa-facebook-f"></i></div>
                <div>Facebook</div>
            </a>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
