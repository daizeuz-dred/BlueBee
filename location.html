<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location - BlueBee Laundry</title>
    <style>
        /* Reusing your exact variables and styles for perfect UI consistency */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@500;700&display=swap');
        
        :root {
            --color-text: #2c3e50;
            --color-primary: #563ce7;
            --font-family-sans-serif: "Nunito", sans-serif;
            --navbar-height: 80px;
        }

        body {
            margin: 0;
            font-family: var(--font-family-sans-serif);
            background-color: #f2f5f7;
            color: var(--color-text);
        }

        .navbar {
            height: var(--navbar-height);
            display: flex;
            align-items: center;
            background-color: white;
            border-bottom: 2px solid #e0e0e0;
        }
        .navbar__container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .navbar__brand { 
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem; 
            color: var(--color-primary);
            text-decoration: none;
        }
        .navbar__list { display: flex; list-style: none; gap: 20px; }
        .navbar__link { text-decoration: none; color: inherit; font-weight: 700; }

        /* Main Content Section */
        .location-section {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 { color: var(--color-primary); font-size: 2.5rem; margin-bottom: 10px; }
        .address-box { margin: 30px 0; font-size: 1.2rem; }
        
        /* Placeholder for a Map */
        .map-placeholder {
            width: 100%;
            height: 300px;
            background-color: #e0e0e0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-top: 30px;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar__container">
            <a href="index.html" class="navbar__brand">BlueBee</a>
            <nav>
                <ul class="navbar__list">
                    <li><a href="index.html" class="navbar__link">Home</a></li>
                    <li><a href="about.html" class="navbar__link">About Us</a></li>
                    <li><a href="location.html" class="navbar__link" style="color: var(--color-primary);">Location</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="location-section">
        <h1>Find Us</h1>
        <div class="address-box">
            <p><strong>Located at:</strong> Atabay, San Jose, Antique</p>
             <p><strong>Near:</strong> Atabay Elementary School</p>
        </div>

        <div class="map-placeholder">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!4v1773504219655!6m8!1m7!1sLJIGWdpN7Qz-yc0FEgHkAw!2m2!1d10.7570672544845!2d121.9432957297488!3f82.8738135778358!4f-0.07239497868195599!5f0.4000000000000002" 
        width="100%" 
        height="100%" 
        style="border:0; border-radius: 15px;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>

        <div class="details-grid">
            <div>
                <h3>Opening Hours</h3>
                <p>Mon - Fri: 8:00 AM - 8:00 PM</p>
                <p>Sat - Sun: 9:00 AM - 6:00 PM</p>
            </div>
            <div>
                <h3>Contact Info</h3>
                <p>Phone: 09948471934</p>
                <p>Email: fernheart@bluebee.com</p>
            </div>
        </div>

        <a href="index.html" class="back-home">← Back to Home</a>
    </main>

</body>
</html>
